<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velvet Cocoa | Artisan Chocolate</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Top Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <!-- Logo -->
            <div class="logo">
                <span class="logo-text">Velvet</span>
                <span class="logo-accent">Cocoa</span>
            </div>
            
            <!-- Menu Links -->
            <ul class="nav-menu">
                <li><a href="#">Collections</a></li>
                <li><a href="#">Gifting</a></li>
                <li><a href="#">Our Story</a></li>
                <li><a href="#">Journal</a></li>
            </ul>
            
            <!-- Right side actions -->
            <div class="nav-actions">
                <a href="#" class="nav-icon">♡</a>
                <a href="#" class="nav-icon">🛍️</a>
                <button class="nav-cta">Shop Now</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <div class="hero-overlay"></div>
        
        <!-- Hero Background Image Container -->
        <div class="hero-image">
            <!-- Placeholder for large hero image (melting chocolate) -->
            <img src="https://picsum.photos/id/1015/2000/1200" alt="Luxurious melting artisan chocolate with gold accents" class="hero-bg">
        </div>
        
        <!-- Hero Content -->
        <div class="hero-content">
            <div class="hero-text">
                <h1 class="hero-headline">Indulge in Pure Velvet</h1>
                <p class="hero-subheadline">Handcrafted single-origin chocolates. Timeless elegance in every bite.</p>
                
                <div class="cta-container">
                    <button class="cta-button" onclick="window.location.href='#shop'">
                        Shop Now
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Subtle scroll indicator -->
        <div class="scroll-indicator">
            <span>Discover the Collection</span>
            <div class="scroll-line"></div>
        </div>
    </header>

    <script src="script.js"></script>
</body>
</html>
