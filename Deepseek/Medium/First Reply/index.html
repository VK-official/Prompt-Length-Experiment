<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Maison Cacao · Luxury Handcrafted Chocolate</title>
  <!-- Sophisticated typography: serif for headings, clean sans-serif for body -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&display=swap" rel="stylesheet">
  <!-- Font Awesome for subtle icon (optional, adds refinement) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* CSS reset & base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #fcf9f5; /* warm ivory base */
      font-family: 'Inter', sans-serif;
      color: #2e241e;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ---------- FADE-IN ANIMATION (page load) ---------- */
    .hero {
      opacity: 0;
      animation: smoothFadeIn 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
    }

    @keyframes smoothFadeIn {
      0% {
        opacity: 0;
        transform: translateY(8px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ---------- HERO SECTION ---------- */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 2rem 1.5rem;
      background: linear-gradient(145deg, #fdfbf9 0%, #f7f2ec 100%);
      position: relative;
      overflow: hidden;
    }

    /* subtle decorative cocoa bean texture (light) */
    .hero::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 10% 20%, rgba(210, 160, 110, 0.03) 0%, transparent 30%),
                        radial-gradient(circle at 90% 70%, rgba(140, 90, 60, 0.02) 0%, transparent 40%);
      pointer-events: none;
    }

    .hero-container {
      max-width: 1280px;
      margin: 0 auto;
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem 4rem;
      align-items: center;
      position: relative;
      z-index: 2;
    }

    /* ----- LEFT CONTENT (elegant typography) ----- */
    .hero-content {
      max-width: 580px;
    }

    .brand-mark {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.2rem;
    }

    .brand-mark i {
      color: #b58b6b;
      font-size: 1.2rem;
    }

    .brand-mark span {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      letter-spacing: 4px;
      text-transform: uppercase;
      font-size: 0.8rem;
      color: #8b6f58;
      border-bottom: 1.5px solid #dccbbc;
      padding-bottom: 4px;
    }

    .hero-content h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 600;
      font-size: clamp(3rem, 8vw, 4.8rem);
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: #261b13;
      margin-bottom: 1.5rem;
      text-wrap: balance;
    }

    .hero-content h1 i {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 500;
      color: #8b5e3c;
    }

    .hero-description {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 1.15rem;
      line-height: 1.6;
      color: #4a3b31;
      margin-bottom: 2.5rem;
      max-width: 480px;
      text-wrap: pretty;
    }

    /* CTA button — refined & luxurious */
    .cta-button {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: #2e241e;
      color: #f3ede5;
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
      padding: 1rem 2.4rem;
      border-radius: 48px;
      border: 1px solid rgba(255, 255, 255, 0.05);
      text-decoration: none;
      box-shadow: 0 12px 24px -8px rgba(40, 25, 15, 0.12);
      transition: all 0.35s ease;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(176, 130, 90, 0.2);
    }

    .cta-button i {
      font-size: 1rem;
      transition: transform 0.25s ease;
      color: #dbbc9b;
    }

    .cta-button:hover {
      background: #1f1712;
      color: #ffffff;
      box-shadow: 0 20px 30px -8px rgba(60, 35, 20, 0.2);
      transform: scale(1.02);
      border-color: #b58b6b;
    }

    .cta-button:hover i {
      transform: translateX(5px);
      color: #e5cdb5;
    }

    /* small refinement text */
    .hero-note {
      margin-top: 2rem;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.9rem;
      color: #7a6654;
    }

    .hero-note .divider {
      width: 40px;
      height: 1px;
      background: #d4bfae;
    }

    /* ----- RIGHT SIDE: CHOCOLATE HERO IMAGE PLACEHOLDER (luxury) ----- */
    .hero-visual {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .image-wrapper {
      position: relative;
      width: 100%;
      max-width: 560px;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 40px 60px -20px rgba(30, 18, 10, 0.25),
                  0 0 0 1px rgba(220, 190, 165, 0.15) inset;
      transition: transform 0.4s ease;
      aspect-ratio: 4 / 5;
      background: #d9c6b4; /* fallback elegant tone */
    }

    .image-wrapper:hover {
      transform: scale(1.01);
    }

    /* High-quality chocolate placeholder image */
    .hero-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: filter 0.4s;
      filter: brightness(1.02) contrast(1.02) saturate(1.1);
    }

    /* Decorative gold accent behind image */
    .hero-visual::after {
      content: "✧";
      position: absolute;
      bottom: -10px;
      right: -10px;
      font-size: 6rem;
      color: #d9b99b;
      opacity: 0.15;
      font-family: serif;
      transform: rotate(15deg);
      pointer-events: none;
      z-index: 0;
    }

    /* floating cacao detail (subtle) */
    .hero-visual::before {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(200,150,110,0.05) 0%, transparent 70%);
      border-radius: 50%;
      top: -30px;
      left: -30px;
      z-index: 0;
    }

    /* ----- RESPONSIVE DESIGN ----- */
    @media (max-width: 900px) {
      .hero-container {
        grid-template-columns: 1fr;
        gap: 3rem;
        text-align: center;
      }

      .hero-content {
        max-width: 100%;
        margin: 0 auto;
      }

      .hero-description {
        margin-left: auto;
        margin-right: auto;
      }

      .brand-mark {
        justify-content: center;
      }

      .hero-note {
        justify-content: center;
      }

      .hero-visual {
        order: -1; /* image first on mobile */
      }

      .image-wrapper {
        max-width: 480px;
        margin: 0 auto;
      }
    }

    @media (max-width: 480px) {
      .hero {
        padding: 1.5rem 1rem;
        min-height: auto;
      }

      .cta-button {
        padding: 0.9rem 1.8rem;
        font-size: 1rem;
      }
    }

    /* Additional polish */
    .accent-gold {
      color: #b48b65;
    }

    i {
      color: inherit;
    }

    /* JS will add a class if needed, but animation is CSS-driven */
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-container">
      <!-- LEFT COLUMN: ELEGANT CONTENT -->
      <div class="hero-content">
        <div class="brand-mark">
          <i class="fas fa-seedling"></i>
          <span>Maison Cacao</span>
        </div>
        <h1>
          Where <i>every bite</i><br>
          tells a story
        </h1>
        <p class="hero-description">
          Small‑batch chocolates crafted from single‑origin beans. 
          An invitation to slow down and savour the extraordinary.
        </p>
        <!-- Call to action button -->
        <a href="#" class="cta-button" id="main-cta">
          Discover the collection 
          <i class="fas fa-arrow-right"></i>
        </a>
        <div class="hero-note">
          <span>★  Awarded 2025</span>
          <span class="divider"></span>
          <span>Ethically sourced</span>
        </div>
      </div>

      <!-- RIGHT COLUMN: HERO IMAGE PLACEHOLDER (luxury chocolate visual) -->
      <div class="hero-visual">
        <div class="image-wrapper">
          <!-- High-quality chocolate hero image (placeholder via Unsplash + elegant fallback) -->
          <img 
            class="hero-image" 
            src="https://images.unsplash.com/photo-1606312619070-d48b4c652a52?w=800&auto=format&fit=crop&q=80" 
            alt="Handcrafted luxury chocolate truffles with gold dust, on marble"
            loading="eager"
            onerror="this.onerror=null; this.src='https://images.pexels.com/photos/918327/pexels-photo-918327.jpeg?auto=compress&cs=tinysrgb&w=800';"
          >
        </div>
        <!-- subtle floating note (decorative) -->
      </div>
    </div>
  </section>

  <!-- JavaScript: enhance with smooth interactions + fallback for fade (already done in CSS) -->
  <script>
    (function() {
      "use strict";

      // 1. Ensure fade-in is always applied (CSS handles it, but we also add a 'loaded' class for extra polish)
      const heroSection = document.querySelector('.hero');
      if (heroSection) {
        // The CSS keyframe runs automatically. We add a data attribute for potential extra animations.
        heroSection.setAttribute('data-loaded', 'true');
      }

      // 2. Smooth interaction: CTA button hover effect is in CSS, but we can add a subtle console-free experience.
      const cta = document.getElementById('main-cta');
      if (cta) {
        cta.addEventListener('click', function(e) {
          e.preventDefault(); // demo only — prevents actual navigation
          // Elegant micro-interaction: simulate a toast or just a gentle pulse
          this.style.transition = 'all 0.2s';
          this.style.transform = 'scale(0.98)';
          setTimeout(() => {
            this.style.transform = '';
          }, 150);
          
          // For demonstration, log a luxurious message (optional)
          console.log('✨ Maison Cacao · Indulgence awaits.');
        });
      }

      // 3. (Bonus) Preload image feeling: we could lazy-load a secondary image but it's fine.
      // 4. Add a subtle parallax or nothing; maintain minimalism.
      
      // 5. If image fails to load (fallback already set in onerror), but we ensure graceful degradation.
      const heroImg = document.querySelector('.hero-image');
      if (heroImg) {
        heroImg.addEventListener('load', () => {
          // image loaded successfully, already visible due to fade-in
        });
      }

      // 6. For extra elegance: a tiny console greeting (optional)
      console.log('%c🍫 Maison Cacao · Handcrafted luxury', 'font-family: serif; font-size: 16px; color: #6b4e3a;');
    })();
  </script>

  <!-- ensure any additional fallback styles are covered -->
  <style>
    /* fallback for browsers that might not support clamp well */
    .hero-content h1 {
      font-size: 4rem;
    }
    @media (max-width: 600px) {
      .hero-content h1 {
        font-size: 2.8rem;
      }
    }
    /* Smooth image loading */
    .hero-image {
      background-color: #3e2c1e; /* deep chocolate fallback while loading */
    }
    /* extra refinement: golden line */
    .hero-content .brand-mark i {
      filter: drop-shadow(0 2px 2px rgba(160, 110, 70, 0.1));
    }
  </style>
</body>
</html>
