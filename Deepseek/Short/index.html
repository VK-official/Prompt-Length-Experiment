<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Velour Chocolates | Hero Section</title>
  <!-- Modern Typography: Playfair Display & Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- External CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="hero">
    <div class="hero-container">
      
      <!-- LEFT COLUMN: Text content -->
      <div class="hero-content">
        <div class="hero-tagline">
          <i class="fas fa-seedling"></i> 
          Bean‑to‑Bar · Since 2012
        </div>
        <h1>
          Velvet cocoa,<br>
          <i>pure indulgence</i>
        </h1>
        <p class="hero-description">
          Handcrafted from single‑origin Peruvian cacao. Each piece is a symphony of rich flavor — 
          ethically sourced, perfectly tempered.
        </p>
        <div class="hero-cta">
          <a href="#" class="btn btn-primary">Explore collection</a>
          <a href="#" class="btn btn-outline">Our story</a>
        </div>

        <!-- Mini image placeholders / trust indicators -->
        <div class="image-meta">
          <div class="mini-thumb">
            <div class="thumb-placeholder"><i class="fas fa-camera-retro"></i></div>
            <div class="thumb-placeholder"><i class="fas fa-image"></i></div>
            <div class="thumb-placeholder"><i class="fas fa-crown"></i></div>
          </div>
          <div class="rating-text">
            <strong>4.95</strong> ★ (1.2k) • <i class="fas fa-award"></i> award‑winning
          </div>
        </div>
      </div>
      
      <!-- RIGHT COLUMN: High‑quality image placeholder -->
      <div class="hero-image">
        <div class="image-wrapper">
          <img 
            class="hero-img" 
            src="https://images.unsplash.com/photo-1549007994-cb4c3a3f3c7f?w=800&auto=format&fit=crop&q=80" 
            alt="Assorted artisan chocolates with cocoa powder and nuts — placeholder for high‑quality image"
            loading="eager"
          >
          <div class="image-badge">
            <i class="fas fa-star"></i>
            <span>premium imagery</span>
            <i class="fas fa-camera"></i>
          </div>
        </div>
        <div class="floating-accent">
          <i class="fas fa-candy-cane"></i>
        </div>
      </div>
    </div>
  </section>

  <!-- External JavaScript -->
  <script src="script.js"></script>
</body>
</html>
