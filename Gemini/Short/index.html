<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artisanal Chocolate</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

    <section class="hero">
        <div class="hero-container">
            <div class="hero-content">
                <span class="eyebrow reveal-item">Est. 2024</span>
                <h1 class="reveal-item">Indulge in <br> <em>Pure Decadence</em></h1>
                <p class="reveal-item">Discover our handcrafted artisanal chocolates, meticulously crafted from the world's finest ethically sourced cacao.</p>
                <div class="hero-actions reveal-item">
                    <a href="#shop" class="btn btn-primary">Shop the Collection</a>
                    <a href="#story" class="btn btn-secondary">Our Story</a>
                </div>
            </div>
            <div class="hero-visual reveal-item">
                <div class="image-wrapper">
                    <img src="https://images.unsplash.com/photo-1549007994-cb92caebd54b?q=80&w=1000&auto=format&fit=crop" alt="Rich chocolate assortment" class="hero-img">
                </div>
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
