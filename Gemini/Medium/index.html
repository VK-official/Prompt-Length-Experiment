<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Artisan Chocolat | Handcrafted Luxury</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <section class="hero">
        <div class="hero-container">
            <div class="hero-content">
                <span class="reveal-text">Est. 1924 • Brussels</span>
                <h1 class="reveal-text">Indulgence <br><em>Refined.</em></h1>
                <p class="reveal-text">Experience the alchemy of rare cacao and artisanal craftsmanship. Hand-poured, sustainably sourced, and delivered to your door.</p>
                <div class="cta-wrapper reveal-text">
                    <a href="#" class="btn-primary">Explore the Collection</a>
                    <a href="#" class="btn-secondary">Our Story</a>
                </div>
            </div>

            <div class="hero-visual">
                <div class="image-placeholder main-img fade-in-up">
                    <img src="https://images.unsplash.com/photo-1548907040-4baa42d10919?auto=format&fit=crop&q=80&w=1000" alt="Handcrafted Dark Chocolate">
                </div>
                <div class="image-placeholder accent-img fade-in-up">
                    <img src="https://images.unsplash.com/photo-1511381939415-e44015466834?auto=format&fit=crop&q=80&w=600" alt="Chocolate Truffles">
                </div>
            </div>
        </div>
        
        <div class="scroll-indicator"></div>
    </section>

    <script src="script.js"></script>
</body>
</html>
